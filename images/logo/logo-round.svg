<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" id="svg1" width="2000" height="2000" viewBox="-1000 -1000 2000 2000" xmlns="http://www.w3.org/2000/svg">
   <defs id="defs1">
      <style>
         .outlined {
            stroke: black;
            stroke-width: 2px;
         }

         .dull {
            fill: white;
         }

         .bright {
            fill: gold;
         }
      </style>

      <g id="one">
         <polygon points="40,55 20,55 20,-55 40,-55 "   class="outlined bright" />
         <polygon points="-4,-11 16,-11 40,-55 20,-55 " class="outlined bright" />
      </g>

      <g id="zero">
         <polygon points="20,55 40,35 40,-35 20,-35 "     class="outlined bright" />
         <polygon points="40,-35 20,-55 -20,-55 -20,-35 " class="outlined bright" />
         <polygon points="-20,-55 -40,-35 -40,35 -20,35 " class="outlined bright" />
         <polygon points="-40,35 -20,55 20,55 20,35 "     class="outlined bright" />
      </g>

      <g id="cross">
         <polygon points="40,55 20,55 -40,-55 -20,-55 " class="outlined bright" />
         <polygon points="-40,55 -20,55 40,-55 20,-55 " class="outlined bright" />
      </g>

      <polygon id="big-tall-rect" points="0,0 60,0 240,-330 180,-330 " />
      <polygon id="big-long-rect" points="0,0 300,0 330,-55 30,-55   " />

      <g id="foot">
         <polygon points="15,0 -15,0 -87,132 -57,132 " class="outlined dull" />
         <polygon points="15,0 -15,0 -15,132 15,132 "  class="outlined dull" />
         <polygon points="15,0 -15,0 57,132 87,132 "   class="outlined dull" />
      </g>

      <text id="0x80" alignment-baseline="central" transform="translate(0 950)" style="
         font-family: monospace;
         font-size: 80px;
         text-anchor: middle;
      " class="outlined dull" >0x80</text>

      <polygon id="fasc" points="-400,-10 400,-10 400,10 -400,10 " class="outlined dull" />
   </defs>

   <g id="main" transform="translate(0 55)">
   <g id="eagle" transform="translate(0 -165)">
      <g id="head" transform="translate(0 0)">
         <polygon points="-180,0 180,0 150,-55 -150,-55 " class="outlined dull"  transform="translate(0  -55)" />
         <polygon points="-150,0 150,0 120,-55 -120,-55 " class="outlined dull"  transform="translate(0 -110)" />
         <polygon points="-120,0 120,0 120,-55 -150,-55 " class="outlined dull"  transform="translate(0 -165)" />
         <polygon points="-240,0 120,0  90,-55 -210,-55 " class="outlined dull"  transform="translate(0 -220)" />
         <polygon points="-150,0  90,0  120,-55 -120,-55 " class="outlined dull" transform="translate(0 -275)" />
      </g>

      <g id="wings" transform="translate(0 330)">
         <g id="U" transform="translate(-90 0)">
            <use href="#big-tall-rect" class="outlined bright" transform="translate(   0 0) scale(-1 1)" />
            <use href="#big-tall-rect" class="outlined dull"   transform="translate( -60 0) scale(-1 1)" />
            <use href="#big-tall-rect" class="outlined dull"   transform="translate(-120 0) scale(-1 1)" />
            <use href="#big-tall-rect" class="outlined dull"   transform="translate(-180 0) scale(-1 1)" />
            <use href="#big-tall-rect" class="outlined bright" transform="translate(-240 0) scale(-1 1)" />
            <use href="#big-long-rect" class="outlined bright" transform="translate(   0 0) scale(-1 1)" />
         </g>

         <g id="T">
            <polygon points=" -30,0  30,0  60,-55  -60,-55 "  class="outlined dull"   transform="translate(0    0)" />
            <polygon points=" -60,0  60,0  90,-55  -90,-55 "  class="outlined dull"   transform="translate(0  -55)" />
            <polygon points=" -90,0  90,0 120,-55 -120,-55 "  class="outlined dull"   transform="translate(0 -110)" />
            <polygon points="-120,0 120,0 150,-55 -150,-55 "  class="outlined dull"   transform="translate(0 -165)" />
            <polygon points="-150,0 150,0 180,-55 -180,-55 "  class="outlined dull"   transform="translate(0 -220)" />
            <polygon points=" -30,0  30,0  30,-330 -30,-330 " class="outlined bright" transform="translate(0    0)" />
            <polygon points="-180,0 180,0 210,-55 -210,-55 "  class="outlined bright" transform="translate(0 -275)" />
         </g>

         <g id="F" transform="translate(90 0)">
            <use href="#big-long-rect" class="outlined bright" transform="translate(150 -275)" />
            <use href="#big-long-rect" class="outlined dull"   transform="translate(120 -220)" />
            <use href="#big-long-rect" class="outlined bright" transform="translate( 90 -165)" />
            <use href="#big-long-rect" class="outlined dull"   transform="translate( 60 -110)" />
            <use href="#big-long-rect" class="outlined dull"   transform="translate( 30  -55)" />
            <use href="#big-long-rect" class="outlined dull"   transform="translate(  0    0)" />
            <use href="#big-tall-rect" class="outlined bright" transform="translate(  0    0)" />
         </g>
      </g>
   </g>

   <g id="fasces" transform="translate(0 440)">
      <polygon id="big-stick" points="-500,-10 420,-10 420,10 -500,10 "         class="outlined dull" />
      <path id="axe" d="M -15 10 Q -5 -5 -40 -60 Q 0 -75 40 -60 Q 5 -5 15 10 z" class="outlined dull" transform="translate(-450,0)" />

      <g id="fascs">
         <use href="#fasc" transform="translate(0,-40)" />
         <use href="#fasc" transform="translate(0,-20)" />
         <use href="#fasc" transform="translate(0,  0)" />
         <use href="#fasc" transform="translate(0, 20)" />
         <use href="#fasc" transform="translate(0, 40)" />
      </g>

      <use href="#one"   transform="translate(-350,0)" />
      <use href="#zero"  transform="translate(-250,0)" />
      <use href="#cross" transform="translate(-150,0)" />
      <use href="#cross" transform="translate( -50,0)" />
      <use href="#cross" transform="translate(  50,0)" />
      <use href="#cross" transform="translate( 150,0)" />
      <use href="#cross" transform="translate( 250,0)" />
      <use href="#cross" transform="translate( 350,0)" />
   </g>

   <g>
      <g id="five" transform="translate(-420 -275)">
         <polygon points="30,0 -90,-220 -150,-220 -30,0 " class="outlined bright" />
         <polygon points="-30,0 30,0 150,-220 90,-220 "   class="outlined bright" />
      </g>

      <g id="three" transform="translate(420 -275)">
         <polygon class="outlined bright" points=" -90,0 -90,-220 -150,-220 -150,0 " />
         <polygon class="outlined bright" points="  30,0  30,-220  -30,-220  -30,0 " />
         <polygon class="outlined bright" points=" 150,0 150,-220   90,-220   90,0 " />
      </g>

      <use href="#foot" transform="translate(-105 220)" />
      <use href="#foot" transform="translate(+105 220)" />
   </g>
   </g>

   <g>
      <use href="#0x80" transform="rotate(  0 0 0)" />
      <use href="#0x80" transform="rotate( 15 0 0)" />
      <use href="#0x80" transform="rotate( 30 0 0)" />
      <use href="#0x80" transform="rotate( 45 0 0)" />
      <use href="#0x80" transform="rotate( 60 0 0)" />
      <use href="#0x80" transform="rotate( 75 0 0)" />
      <use href="#0x80" transform="rotate( 90 0 0)" />
      <use href="#0x80" transform="rotate(105 0 0)" />
      <use href="#0x80" transform="rotate(120 0 0)" />
      <use href="#0x80" transform="rotate(135 0 0)" />
      <use href="#0x80" transform="rotate(150 0 0)" />
      <use href="#0x80" transform="rotate(165 0 0)" />
      <use href="#0x80" transform="rotate(180 0 0)" />
      <use href="#0x80" transform="rotate(195 0 0)" />
      <use href="#0x80" transform="rotate(210 0 0)" />
      <use href="#0x80" transform="rotate(225 0 0)" />
      <use href="#0x80" transform="rotate(240 0 0)" />
      <use href="#0x80" transform="rotate(255 0 0)" />
      <use href="#0x80" transform="rotate(270 0 0)" />
      <use href="#0x80" transform="rotate(285 0 0)" />
      <use href="#0x80" transform="rotate(300 0 0)" />
      <use href="#0x80" transform="rotate(315 0 0)" />
      <use href="#0x80" transform="rotate(330 0 0)" />
      <use href="#0x80" transform="rotate(345 0 0)" />
   </g>
</svg>
